<!DOCTYPE html>
<html lang="en" hx-ext="modal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .type-purchase { color: #198754; }
        .type-sale { color: #dc3545; }
        .type-adjustment { color: #ffc107; }
        .type-production { color: #0dcaf0; }
    </style>
</head>
<body hx-ext="modal" hx-indicator="body">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h5><i class="bi bi-box-seam"></i> <span class="sidebar-text">IMS</span></h5>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-link">
                <i class="bi bi-grid-1x2"></i> <span class="sidebar-text">Dashboard</span>
            </a>
            <a href="/products" class="nav-link">
                <i class="bi bi-box"></i> <span class="sidebar-text">Products</span>
            </a>
            <a href="/categories" class="nav-link">
                <i class="bi bi-tags"></i> <span class="sidebar-text">Categories</span>
            </a>
            <a href="/inventory" class="nav-link">
                <i class="bi bi-clipboard-data"></i> <span class="sidebar-text">Inventory</span>
            </a>
            <div class="nav-section-title">Production</div>
            <a href="/bom" class="nav-link">
                <i class="bi bi-diagram-3"></i> <span class="sidebar-text">Bill of Materials</span>
            </a>
            <a href="/production" class="nav-link">
                <i class="bi bi-hammer"></i> <span class="sidebar-text">Production Orders</span>
            </a>
            <div class="nav-section-title">Procurement</div>
            <a href="/suppliers" class="nav-link">
                <i class="bi bi-truck"></i> <span class="sidebar-text">Suppliers</span>
            </a>
            <a href="/purchase-orders" class="nav-link">
                <i class="bi bi-receipt"></i> <span class="sidebar-text">Purchase Orders</span>
            </a>
            <div class="nav-section-title">Analytics</div>
            <a href="/transactions" class="nav-link active">
                <i class="bi bi-arrow-left-right"></i> <span class="sidebar-text">Transactions</span>
            </a>
            <a href="/reports" class="nav-link">
                <i class="bi bi-graph-up"></i> <span class="sidebar-text">Reports</span>
            </a>
            <div class="nav-section-title">System</div>
            <a href="/settings" class="nav-link">
                <i class="bi bi-gear"></i> <span class="sidebar-text">Settings</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <header class="topbar">
            <button class="btn btn-link toggle-btn" id="toggleSidebar">
                <i class="bi bi-list"></i>
            </button>
            <div class="topbar-title">
                <h4>Transactions</h4>
            </div>
            <div class="topbar-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="bi bi-sun"></i>
                    <i class="bi bi-moon"></i>
                </button>
                <div class="dropdown">
                    <button class="user-dropdown" data-bs-toggle="dropdown" id="userDropdown">
                        <div class="user-avatar">A</div>
                        <span id="currentUser">Admin</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>
        
        <main class="content">
            <div class="page-header">
                <h4 class="mb-0">Transaction History</h4>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <select class="form-select" id="filterType" onchange="loadTransactions()">
                                <option value="">All Types</option>
                                <option value="purchase">Purchase</option>
                                <option value="sale">Sale</option>
                                <option value="adjustment">Adjustment</option>
                                <option value="production">Production</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterProduct" onchange="loadTransactions()">
                                <option value="">All Products</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterLimit" onchange="loadTransactions()">
                                <option value="50">Last 50</option>
                                <option value="100" selected>Last 100</option>
                                <option value="500">Last 500</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="transactionsTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Product</th>
                                    <th>SKU</th>
                                    <th>Quantity</th>
                                    <th>Reference</th>
                                    <th>User</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody id="transactionsTableBody">
                                <tr><td colspan="8" class="text-center py-4"><div class="spinner-border"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Initialize theme on page load
        (function initTheme() {
            const saved = localStorage.getItem('ims-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        let transactions = [];
        let products = [];

        function getToken() { return localStorage.getItem('token'); }
        
        async function apiCall(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) { window.location.href = '/login'; throw new Error('Unauthorized'); }
            if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Error'); }
            return response.json();
        }

        function formatDate(date) {
            return new Date(date).toLocaleString();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0 show`;
            toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function loadTransactions() {
            try {
                let url = '/api/reports/transactions?';
                const type = document.getElementById('filterType').value;
                const productId = document.getElementById('filterProduct').value;
                const limit = document.getElementById('filterLimit').value;
                if (type) url += `type=${type}&`;
                if (productId) url += `product_id=${productId}&`;
                url += `limit=${limit}`;
                transactions = await apiCall(url);
                renderTransactions();
            } catch (err) { showToast('Failed to load transactions', 'danger'); }
        }

        async function loadProducts() {
            try {
                products = await apiCall('/api/products');
                const select = document.getElementById('filterProduct');
                select.innerHTML = '<option value="">All Products</option>' + 
                    products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        function renderTransactions() {
            const tbody = document.getElementById('transactionsTableBody');
            if (!transactions.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No transactions found</td></tr>';
                return;
            }
            tbody.innerHTML = transactions.map(t => {
                const typeClass = 'type-' + t.type;
                const qtySign = t.quantity > 0 ? `+${t.quantity}` : t.quantity;
                const ref = t.reference_type ? `${t.reference_type} #${t.reference_id}` : '-';
                return `
                <tr>
                    <td><small>${formatDate(t.created_at)}</small></td>
                    <td><span class="${typeClass}"><i class="bi bi-${t.type === 'purchase' ? 'arrow-down-circle' : t.type === 'sale' ? 'arrow-up-circle' : 'arrow-repeat'}"></i> ${t.type}</span></td>
                    <td>${t.product_name || '-'}</td>
                    <td><code>${t.product_sku || '-'}</code></td>
                    <td><strong>${qtySign}</strong></td>
                    <td><small>${ref}</small></td>
                    <td>${t.user_name || '-'}</td>
                    <td><small>${t.notes || '-'}</small></td>
                </tr>`}).join('');
        }

        document.getElementById('themeToggle')?.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('ims-theme', next);
        });
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        });

        const userStr = localStorage.getItem('user');
        if (userStr) {
            try { 
                const user = JSON.parse(userStr);
                document.getElementById('currentUser').textContent = user.username;
                const avatar = document.querySelector('.user-avatar');
                if (avatar) avatar.textContent = user.username.charAt(0).toUpperCase();
            } catch (e) {}
        }

        document.getElementById('toggleSidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        loadProducts();
        loadTransactions();
    </script>
</body>
</html>
