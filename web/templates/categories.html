<!DOCTYPE html>
<html lang="en" hx-ext="modal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</head>
<body hx-ext="modal" hx-indicator="body">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h5><i class="bi bi-box-seam"></i> <span class="sidebar-text">IMS</span></h5>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="sidebar-text">Dashboard</span></a>
            <a href="/products" class="nav-link"><i class="bi bi-box"></i> <span class="sidebar-text">Products</span></a>
            <a href="/categories" class="nav-link active"><i class="bi bi-tags"></i> <span class="sidebar-text">Categories</span></a>
            <a href="/inventory" class="nav-link"><i class="bi bi-clipboard-data"></i> <span class="sidebar-text">Inventory</span></a>
            <div class="nav-section-title">Production</div>
            <a href="/bom" class="nav-link"><i class="bi bi-diagram-3"></i> <span class="sidebar-text">Bill of Materials</span></a>
            <a href="/production" class="nav-link"><i class="bi bi-hammer"></i> <span class="sidebar-text">Production Orders</span></a>
            <div class="nav-section-title">Procurement</div>
            <a href="/suppliers" class="nav-link"><i class="bi bi-truck"></i> <span class="sidebar-text">Suppliers</span></a>
            <a href="/purchase-orders" class="nav-link"><i class="bi bi-receipt"></i> <span class="sidebar-text">Purchase Orders</span></a>
            <div class="nav-section-title">Analytics</div>
            <a href="/transactions" class="nav-link"><i class="bi bi-arrow-left-right"></i> <span class="sidebar-text">Transactions</span></a>
            <a href="/reports" class="nav-link"><i class="bi bi-graph-up"></i> <span class="sidebar-text">Reports</span></a>
            <div class="nav-section-title">System</div>
            <a href="/settings" class="nav-link"><i class="bi bi-gear"></i> <span class="sidebar-text">Settings</span></a>
        </nav>
    </div>

    <div class="main-content">
        <header class="topbar">
            <button class="btn btn-link toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
            <div class="topbar-title"><h4>Categories</h4></div>
            <div class="topbar-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="bi bi-sun"></i>
                    <i class="bi bi-moon"></i>
                </button>
                <div class="dropdown">
                    <button class="user-dropdown" data-bs-toggle="dropdown" id="userDropdown">
                        <div class="user-avatar">A</div>
                        <span id="currentUser">Admin</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>
        
        <main class="content">
            <div class="page-header">
                <h4 class="mb-0">Categories</h4>
                <button class="btn btn-primary" onclick="showCategoryModal()">
                    <i class="bi bi-plus-lg"></i> Add Category
                </button>
            </div>

            <div class="card">
                <div class="card-body">
                    <table class="table table-hover" id="categoryTable">
                        <thead>
                            <tr><th>Name</th><th>Description</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="categoryTableBody">
                            <tr><td colspan="3" class="text-center py-4"><div class="spinner-border"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="categoryForm" onsubmit="saveCategory(event)">
                    <div class="modal-body">
                        <input type="hidden" id="categoryId">
                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" class="form-control" id="categoryName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="categoryDesc" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Initialize theme on page load
        (function initTheme() {
            const saved = localStorage.getItem('ims-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        let categories = [];

        function getToken() { return localStorage.getItem('token'); }
        
        async function apiCall(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) { window.location.href = '/login'; throw new Error('Unauthorized'); }
            if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Error'); }
            return response.json();
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0 show`;
            toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function loadCategories() {
            try {
                categories = await apiCall('/api/categories');
                renderCategories();
            } catch (err) { showToast('Failed to load categories', 'danger'); }
        }

        function renderCategories() {
            const tbody = document.getElementById('categoryTableBody');
            if (!categories.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">No categories found</td></tr>';
                return;
            }
            tbody.innerHTML = categories.map(c => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.description || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-secondary" onclick="editCategory(${c.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${c.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function showCategoryModal() {
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryModalTitle').textContent = 'Add Category';
            document.getElementById('categoryForm').reset();
            new bootstrap.Modal(document.getElementById('categoryModal')).show();
        }

        function editCategory(id) {
            const c = categories.find(x => x.id === id);
            if (!c) return;
            document.getElementById('categoryId').value = c.id;
            document.getElementById('categoryModalTitle').textContent = 'Edit Category';
            document.getElementById('categoryName').value = c.name;
            document.getElementById('categoryDesc').value = c.description || '';
            new bootstrap.Modal(document.getElementById('categoryModal')).show();
        }

        async function saveCategory(e) {
            e.preventDefault();
            const id = document.getElementById('categoryId').value;
            const data = {
                name: document.getElementById('categoryName').value,
                description: document.getElementById('categoryDesc').value
            };
            try {
                if (id) {
                    await apiCall(`/api/categories/${id}`, { method: 'PUT', body: JSON.stringify(data) });
                    showToast('Category updated');
                } else {
                    await apiCall('/api/categories', { method: 'POST', body: JSON.stringify(data) });
                    showToast('Category created');
                }
                bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                loadCategories();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        async function deleteCategory(id) {
            if (!confirm('Delete this category?')) return;
            try {
                await apiCall(`/api/categories/${id}`, { method: 'DELETE' });
                showToast('Category deleted');
                loadCategories();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/login';
        });
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('ims-theme', next);
        });
        document.getElementById('toggleSidebar').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
        const userStr = localStorage.getItem('user');
        if (userStr) {
            try { 
                const user = JSON.parse(userStr);
                document.getElementById('currentUser').textContent = user.username;
                const avatar = document.querySelector('.user-avatar');
                if (avatar) avatar.textContent = user.username.charAt(0).toUpperCase();
            } catch (e) {}
        }
        loadCategories();
    </script>
</body>
</html>
