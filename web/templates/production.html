<!DOCTYPE html>
<html lang="en" hx-ext="modal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Orders - Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</head>
<body hx-ext="modal" hx-indicator="body">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h5><i class="bi bi-box-seam"></i> <span class="sidebar-text">IMS</span></h5>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="sidebar-text">Dashboard</span></a>
            <a href="/products" class="nav-link"><i class="bi bi-box"></i> <span class="sidebar-text">Products</span></a>
            <a href="/categories" class="nav-link"><i class="bi bi-tags"></i> <span class="sidebar-text">Categories</span></a>
            <a href="/inventory" class="nav-link"><i class="bi bi-clipboard-data"></i> <span class="sidebar-text">Inventory</span></a>
            <div class="nav-section-title">Production</div>
            <a href="/bom" class="nav-link"><i class="bi bi-diagram-3"></i> <span class="sidebar-text">Bill of Materials</span></a>
            <a href="/production" class="nav-link active"><i class="bi bi-hammer"></i> <span class="sidebar-text">Production Orders</span></a>
            <div class="nav-section-title">Procurement</div>
            <a href="/suppliers" class="nav-link"><i class="bi bi-truck"></i> <span class="sidebar-text">Suppliers</span></a>
            <a href="/purchase-orders" class="nav-link"><i class="bi bi-receipt"></i> <span class="sidebar-text">Purchase Orders</span></a>
            <div class="nav-section-title">Analytics</div>
            <a href="/transactions" class="nav-link"><i class="bi bi-arrow-left-right"></i> <span class="sidebar-text">Transactions</span></a>
            <a href="/reports" class="nav-link"><i class="bi bi-graph-up"></i> <span class="sidebar-text">Reports</span></a>
            <div class="nav-section-title">System</div>
            <a href="/settings" class="nav-link"><i class="bi bi-gear"></i> <span class="sidebar-text">Settings</span></a>
        </nav>
    </div>

    <div class="main-content">
        <header class="topbar">
            <button class="btn btn-link toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
            <div class="topbar-title"><h4>Production Orders</h4></div>
            <div class="topbar-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="bi bi-sun"></i>
                    <i class="bi bi-moon"></i>
                </button>
                <div class="dropdown">
                    <button class="user-dropdown" data-bs-toggle="dropdown" id="userDropdown">
                        <div class="user-avatar">A</div>
                        <span id="currentUser">Admin</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>
        
        <main class="content">
            <div class="page-header">
                <h4 class="mb-0">Production Orders</h4>
                <button class="btn btn-primary" onclick="showProductionModal()">
                    <i class="bi bi-plus-lg"></i> New Order
                </button>
            </div>

            <div class="row" id="productionBoard">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header bg-light">
                            <i class="bi bi-file-earmark me-2"></i>Draft
                        </div>
                        <div class="card-body p-2" id="draftOrders"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header bg-info bg-opacity-10 text-info">
                            <i class="bi bi-play-circle me-2"></i>In Progress
                        </div>
                        <div class="card-body p-2" id="inProgressOrders"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header bg-success bg-opacity-10 text-success">
                            <i class="bi bi-check-circle me-2"></i>Completed
                        </div>
                        <div class="card-body p-2" id="completedOrders"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="productionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Production Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="productionForm" onsubmit="createProduction(event)">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">BOM *</label>
                            <select class="form-select" id="productionBOM" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantity *</label>
                            <input type="number" class="form-control" id="productionQty" min="1" value="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" id="productionNotes" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Order</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Initialize theme on page load
        (function initTheme() {
            const saved = localStorage.getItem('ims-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        let orders = [];
        let boms = [];

        function getToken() { return localStorage.getItem('token'); }
        
        async function apiCall(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) { window.location.href = '/login'; throw new Error('Unauthorized'); }
            if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Error'); }
            return response.json();
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0 show`;
            toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function loadProductionOrders() {
            try {
                orders = await apiCall('/api/production-orders');
                renderProductionBoard();
            } catch (err) { showToast('Failed to load orders', 'danger'); }
        }

        async function loadBOMs() {
            try {
                boms = await apiCall('/api/bom');
                document.getElementById('productionBOM').innerHTML = 
                    '<option value="">Select BOM...</option>' + 
                    boms.map(b => `<option value="${b.id}">${b.product_name} (v${b.version})</option>`).join('');
            } catch (err) { console.error(err); }
        }

        function renderProductionBoard() {
            const draft = orders.filter(o => o.status === 'draft');
            const inProgress = orders.filter(o => o.status === 'in_progress');
            const completed = orders.filter(o => o.status === 'completed');

            document.getElementById('draftOrders').innerHTML = renderOrders(draft, 'draft');
            document.getElementById('inProgressOrders').innerHTML = renderOrders(inProgress, 'in_progress');
            document.getElementById('completedOrders').innerHTML = renderOrders(completed, 'completed');
        }

        function renderOrders(orderList, status) {
            if (!orderList.length) return '<div class="text-center text-muted py-3 small">No orders</div>';
            return orderList.map(o => `
                <div class="card mb-2">
                    <div class="card-body p-2">
                        <div class="fw-medium">${o.product_name}</div>
                        <small class="text-muted">Qty: ${o.quantity}</small>
                        ${status === 'draft' ? `
                            <div class="mt-2">
                                <button class="btn btn-sm btn-success" onclick="startProduction(${o.id})">Start</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="cancelProduction(${o.id})">Cancel</button>
                            </div>
                        ` : ''}
                        ${status === 'in_progress' ? `
                            <div class="mt-2">
                                <button class="btn btn-sm btn-primary" onclick="completeProduction(${o.id})">Complete</button>
                            </div>
                        ` : ''}
                    </div>
                </div>`).join('');
        }

        function showProductionModal() {
            document.getElementById('productionForm').reset();
            loadBOMs();
            new bootstrap.Modal(document.getElementById('productionModal')).show();
        }

        async function createProduction(e) {
            e.preventDefault();
            try {
                await apiCall('/api/production-orders', {
                    method: 'POST',
                    body: JSON.stringify({
                        bom_id: parseInt(document.getElementById('productionBOM').value),
                        quantity: parseInt(document.getElementById('productionQty').value),
                        notes: document.getElementById('productionNotes').value
                    })
                });
                showToast('Production order created');
                bootstrap.Modal.getInstance(document.getElementById('productionModal')).hide();
                loadProductionOrders();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        async function startProduction(id) {
            try {
                await apiCall(`/api/production-orders/${id}/start`, { method: 'POST' });
                showToast('Production started');
                loadProductionOrders();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        async function completeProduction(id) {
            try {
                await apiCall(`/api/production-orders/${id}/complete`, { method: 'POST' });
                showToast('Production completed');
                loadProductionOrders();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        async function cancelProduction(id) {
            if (!confirm('Cancel this order?')) return;
            try {
                await apiCall(`/api/production-orders/${id}/cancel`, { method: 'POST' });
                showToast('Order cancelled');
                loadProductionOrders();
            } catch (err) { showToast(err.message, 'danger'); }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/login';
        });
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('ims-theme', next);
        });
        document.getElementById('toggleSidebar').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
        const userStr = localStorage.getItem('user');
        if (userStr) {
            try { 
                const user = JSON.parse(userStr);
                document.getElementById('currentUser').textContent = user.username;
                const avatar = document.querySelector('.user-avatar');
                if (avatar) avatar.textContent = user.username.charAt(0).toUpperCase();
            } catch (e) {}
        }
        loadProductionOrders();
    </script>
</body>
</html>
